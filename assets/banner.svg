<svg width="100%" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>Claude-UniMath</title>
  <desc>Universal right-to-left and mathematics support for Claude Desktop on macOS. The illustration shows Hebrew prose flowing right-to-left with a left-to-right math island isolated in the middle.</desc>

  <!-- transparent background; works on light and dark GitHub themes via currentColor-free explicit colors -->
  <style>
    .title   { font-size: 40px; font-weight: 700; fill: #D97706; }
    .tagline { font-size: 16px; font-weight: 400; fill: #6B7280; }
    .heb     { font-size: 19px; font-weight: 500; fill: #111827; }
    .mathbox { fill: #EEF2FF; stroke: #6366F1; stroke-width: 1.5; }
    .mathtxt { font-size: 18px; font-weight: 500; fill: #4338CA; font-family: 'Latin Modern Math','Cambria Math',serif; }
    .codebox { fill: #F3F4F6; stroke: #9CA3AF; stroke-width: 1; }
    .codetxt { font-size: 14px; font-weight: 400; fill: #374151; font-family: 'SF Mono', Menlo, Consolas, monospace; }
    .pill    { fill: #ECFDF5; stroke: #10B981; stroke-width: 1; }
    .pilltxt { font-size: 12px; font-weight: 500; fill: #065F46; }
    @media (prefers-color-scheme: dark) {
      .title   { fill: #FBBF24; }
      .tagline { fill: #9CA3AF; }
      .heb     { fill: #F9FAFB; }
      .mathbox { fill: #312E81; stroke: #818CF8; }
      .mathtxt { fill: #C7D2FE; }
      .codebox { fill: #1F2937; stroke: #4B5563; }
      .codetxt { fill: #D1D5DB; }
      .pill    { fill: #064E3B; stroke: #34D399; }
      .pilltxt { fill: #A7F3D0; }
    }
  </style>

  <!-- Wordmark -->
  <text x="340" y="52" text-anchor="middle" class="title">Claude-UniMath</text>
  <text x="340" y="80" text-anchor="middle" class="tagline">Universal RTL + math for Claude Desktop on macOS</text>

  <!-- Demonstration line: Hebrew flows RTL, the math sits as an isolated LTR island -->
  <!-- We lay it out visually right-to-left: rightmost Hebrew first. -->
  <text x="640" y="140" text-anchor="end" class="heb">הערך העצמי הוא</text>

  <!-- isolated math island -->
  <rect x="356" y="122" width="118" height="26" rx="5" class="mathbox"/>
  <text x="415" y="140" text-anchor="middle" class="mathtxt">λ = 3</text>

  <text x="350" y="140" text-anchor="end" class="heb">עם ריבוי</text>

  <!-- second small math island -->
  <rect x="232" y="122" width="34" height="26" rx="5" class="mathbox"/>
  <text x="249" y="140" text-anchor="middle" class="mathtxt">2</text>

  <!-- code stays LTR, left side -->
  <rect x="40" y="166" width="240" height="30" rx="6" class="codebox"/>
  <text x="52" y="186" class="codetxt">def solve(a, b, c): ...</text>

  <!-- feature pills, right side -->
  <rect x="404" y="168" width="104" height="24" rx="12" class="pill"/>
  <text x="456" y="184" text-anchor="middle" class="pilltxt">every RTL script</text>

  <rect x="516" y="168" width="124" height="24" rx="12" class="pill"/>
  <text x="578" y="184" text-anchor="middle" class="pilltxt">KaTeX stays upright</text>
</svg>
